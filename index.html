<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Judy Wang | AI & Finance Portfolio</title>
    <!-- 引入图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #003366;
            --light-blue: #eef2f7;
            --accent-gold: #c5a059;
            --text-dark: #333;
            --text-light: #666;
        }

        body { 
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            line-height: 1.6; color: var(--text-dark); 
            margin: 0; padding: 0; background-color: #f4f7f9; 
        }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        /* Header Area */
        header { 
            background: var(--primary-blue); color: white; 
            padding: 60px 0; text-align: center; 
        }
        header img { 
            width: 160px; height: 200px; border-radius: 8px; 
            border: 4px solid white; object-fit: cover; margin-bottom: 20px;
        }
        header h1 { margin: 10px 0; font-size: 2.2em; letter-spacing: 1px; }
        header p { font-weight: 300; font-size: 1.1em; opacity: 0.9; }

        /* Section Layout */
        section { background: white; padding: 30px; margin: 25px 0; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { 
            color: var(--primary-blue); border-bottom: 2px solid var(--light-blue); 
            padding-bottom: 10px; margin-bottom: 20px; display: flex; align-items: center;
        }
        h2 i { margin-right: 10px; }

        /* Grid for Skills */
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .tag { background: var(--light-blue); color: var(--primary-blue); padding: 5px 12px; border-radius: 4px; font-size: 0.9em;
